<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="estilo_exercicio_1.css">
</head>

<body>

    <main>
        <h1>Dados da conta</h1>
        <hr>
        <figure>
            <img src="form1_back.jpg" alt="Imagem de Formulario">
        </figure>

        <form action="../../menu-cap5.html">
            <fieldset>
                <legend>Dados Pessoais</legend>

                    <div>
                        <label for="Nome">Nome:</label>
                        <input type="text" name="nome" id="Nome">
                    </div>

                    <div>
                        <label for="Email">Email:</label>
                        <input type="email" name="email" id="Email">
                    </div>
            </fieldset>

            <fieldset>
                <legend>Dados da Conta</legend>

                    <div>
                        <label for="Senha">Senha:</label>
                        <input type="password" name="senha" id="Senha">
                    </div>

                    <div>
                        <label for="Frase_opcional">Frase Opcional</label>
                        <input type="text" name="frase_opcional" id="Frase_opcional">
                    </div>
            </fieldset>

            <br>
            <input type="submit" value="Enviar">
        </form>

        <p><a href="../../menu-cap5.html">Voltar para o Menu do capitulo 5</a></p>

    </main>
</body>

</html>
